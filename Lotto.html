<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
}

header {
  padding: 15px;
  font-size: 20px;
  background: #111827;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
  font-size: 20px;
}

button {
  padding: 15px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.numbers {
  font-size: 28px;
  letter-spacing: 5px;
}
</style>
</head>

<body>

<header>
 <img src="icon.png" width="30"> Welcome, <span id="user"></span> <img src="icon2.png" width="20">
</header>

<div class="card">
  <h3>Banker</h3>
  <div id="banker" class="numbers">--</div>
</div>

<div class="card">
  <h3>Sure 2</h3>
  <div id="sure2" class="numbers">-- --</div>
</div>

<div class="card">
  <h3>Sure 3</h3>
  <div id="sure3" class="numbers">-- -- --</div>
</div>

<button onclick="generate()">Generate Live Prediction</button>

<style>
/* Inline Modal / Panel for Limit Notice */
.limit-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(30,41,59,0.95);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  color: gold;
  font-weight: bold;
  text-align: center;
  z-index: 9999;
  transition: transform 0.3s ease, opacity 0.3s ease;
  opacity: 0;
}

.limit-panel.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.limit-panel button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: gold;
  cursor: pointer;
  font-weight: bold;
}
</style>

<!-- Add this inside body -->
<div id="limitPanel" class="limit-panel">
  <p id="limitMsg"></p>
  <button onclick="closeLimitPanel()">OK</button>
</div>

<script>
if (!localStorage.getItem("subscribed")) {
  window.location.href = "index.html";
}

document.getElementById("user").innerText =
  localStorage.getItem("user") || "User";

function random() {
  return Math.floor(Math.random() * 90) + 1;
}

// LIMIT SETTINGS
const MAX_USES = 5;
const COOLDOWN = 6 * 60 * 60 * 1000; // 6 hours

function getUsageData() {
  return JSON.parse(localStorage.getItem("usageData")) || {
    count: 0,
    startTime: Date.now()
  };
}

function saveUsageData(data) {
  localStorage.setItem("usageData", JSON.stringify(data));
}

function canGenerate() {
  let data = getUsageData();
  let now = Date.now();
  let elapsed = now - data.startTime;

  if (elapsed > COOLDOWN) {
    // reset after 6 hours
    data = { count: 0, startTime: now };
    saveUsageData(data);
    return true;
  }

  return data.count < MAX_USES;
}

function updateUsage() {
  let data = getUsageData();
  data.count++;
  saveUsageData(data);
}

function getRemainingTime() {
  let data = getUsageData();
  let remaining = COOLDOWN - (Date.now() - data.startTime);

  let hrs = Math.floor(remaining / (1000 * 60 * 60));
  let mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));

  return hrs + "h " + mins + "m";
}

// Limit panel functions
function showLimitPanel() {
  const panel = document.getElementById("limitPanel");
  const msg = document.getElementById("limitMsg");
  msg.innerText = "Limit reached.\nTry again in " + getRemainingTime();
  panel.classList.add("show");
}

function closeLimitPanel() {
  document.getElementById("limitPanel").classList.remove("show");
}

// Animate numbers
function animate(element, count, delay) {
  let i = 0;
  let interval = setInterval(() => {
    element.innerText = random();
    i++;
    if (i > count) clearInterval(interval);
  }, delay);
}

// Main generate function
function generate() {
  if (!canGenerate()) {
    showLimitPanel();
    document.querySelector("button").disabled = true;
    return;
  }

  updateUsage();

  // Animate numbers
  animate(document.getElementById("banker"), 20, 50);

  setTimeout(() => {
    document.getElementById("sure2").innerText =
      random() + "  " + random();
  }, 1000);

  setTimeout(() => {
    document.getElementById("sure3").innerText =
      random() + "  " + random() + "  " + random();
  }, 1500);
}

// Optional: Re-enable button after cooldown (live)
setInterval(() => {
  if (canGenerate()) {
    document.querySelector("button").disabled = false;
  }
}, 60000);
</script>
</body>
</html>
