<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* HEADER */
header {
  padding: 15px;
  background: #111827;
  text-align: center;
}

/* SCROLL TABS */
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
  background: #020617;
}

.tabs::-webkit-scrollbar {
  display: none;
}

.tab {
  padding: 10px 15px;
  background: #1e293b;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
  font-size: 14px;
  transition: 0.3s;
}

.tab.active {
  background: gold;
  color: black;
  font-weight: bold;
}

/* CONTENT */
.card {
  background: #1e293b;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.numbers {
  font-size: 26px;
  letter-spacing: 5px;
}

/* BUTTON */
button {
  display: block;
  margin: 20px auto;
  padding: 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: gold;
  font-weight: bold;
}

/* LIMIT PANEL */
.limit-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(30,41,59,0.95);
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  color: gold;
  text-align: center;
  opacity: 0;
  transition: 0.3s;
}

.limit-panel.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
</style>
</head>

<body>

<header>
  <img src="icon.png" width="25"> Welcome, <span id="user"></span>  <img src="icon2.png" width="20">
</header>

<!-- SCROLL TABS -->
<div class="tabs" id="tabs"></div>

<!-- CONTENT -->
<div id="content"></div>

<button id="generateBtn" onclick="generate()">Generate Prediction</button>

<!-- LIMIT PANEL -->
<div id="limitPanel" class="limit-panel">
  <p id="limitMsg"></p>
  <button onclick="closeLimit()">OK</button>
</div>

<script>
// AUTH
if (!localStorage.getItem("subscribed")) {
  window.location.href = "index.html";
}

document.getElementById("user").innerText =
  localStorage.getItem("user") || "User";

// FULL MARKET LIST
const markets = [
"Royal","Mark II","Enugu","Lucky","Total","Diamond","Peoples","Bingo",
"Metro","Inter","Gold","06","Jackpot","Club Master","Super",
"VAG","Fair Chance","King","MSP","Mid-Week","Bonanza","National"
];

// MARKET TYPES
function getType(name) {
  if (["Royal","Mark II","Lucky","Total"].includes(name)) return "basic";
  if (["Enugu","Metro","Diamond","Peoples"].includes(name)) return "advanced";
  return "pro";
}

// CREATE TABS
let activeMarket = "Royal";
const tabsDiv = document.getElementById("tabs");

markets.forEach(m => {
  let div = document.createElement("div");
  div.className = "tab";
  div.innerText = m;

  if (m === activeMarket) div.classList.add("active");

  div.onclick = () => {
    activeMarket = m;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    div.classList.add("active");
    renderMarket();
  };

  tabsDiv.appendChild(div);
});

// RENDER MARKET
function renderMarket() {
  let type = getType(activeMarket);
  let html = "";

  if (type === "basic") {
    html = card("Banker") + card("Sure 2") + card("Sure 3");
  }

  if (type === "advanced") {
    html = card("Banker") + card("Sure 2") + card("Sure 3") +
           card("Sure 4") + card("Sure 5");
  }

  if (type === "pro") {
    html = card("Banker") + card("Nap 2") + card("Nap 3") +
           card("Nap 4") + card("4 Direct") + card("5 Direct");
  }

  document.getElementById("content").innerHTML = html;
}

// CARD
function card(title) {
  return `
    <div class="card">
      <h3>${title}</h3>
      <div class="numbers">--</div>
    </div>
  `;
}

// RANDOM
function random() {
  return Math.floor(Math.random() * 90) + 1;
}

// LIMIT SYSTEM
const MAX = 5;
const COOLDOWN = 6 * 60 * 60 * 1000;

function getData() {
  return JSON.parse(localStorage.getItem("usage")) || {count:0,time:Date.now()};
}

function saveData(d) {
  localStorage.setItem("usage", JSON.stringify(d));
}

function canUse() {
  let d = getData();
  if (Date.now() - d.time > COOLDOWN) {
    d = {count:0,time:Date.now()};
    saveData(d);
    return true;
  }
  return d.count < MAX;
}

function updateUse() {
  let d = getData();
  d.count++;
  saveData(d);
}

function remaining() {
  let d = getData();
  let r = COOLDOWN - (Date.now() - d.time);
  let h = Math.floor(r/3600000);
  let m = Math.floor((r%3600000)/60000);
  return h+"h "+m+"m";
}

function showLimit() {
  document.getElementById("limitMsg").innerText =
    "Limit reached. Try again in " + remaining();
  document.getElementById("limitPanel").classList.add("show");
}

function closeLimit() {
  document.getElementById("limitPanel").classList.remove("show");
}

// GENERATE
function pick(count) {
  let nums = [];
  while (nums.length < count) {
    let n = Math.floor(Math.random() * 90) + 1;
    if (!nums.includes(n)) nums.push(n);
  }
  return nums.join(" ");
}

function generate() {
  if (!canUse()) {
    showLimit();
    return;
  }

  updateUse();

  let type = getType(activeMarket);

  let cards = document.querySelectorAll(".numbers");

  cards.forEach((el, index) => {
    let label = el.previousElementSibling.innerText;

    let count = 1;

    if (label.includes("Sure 2") || label.includes("Nap 2")) count = 2;
    if (label.includes("Sure 3") || label.includes("Nap 3")) count = 3;
    if (label.includes("Sure 4") || label.includes("Nap 4")) count = 4;
    if (label.includes("Sure 5")) count = 5;
    if (label.includes("4 Direct")) count = 4;
    if (label.includes("5 Direct")) count = 5;

    let i = 0;
    let interval = setInterval(() => {
      el.innerText = pick(count);
      i++;
      if (i > 15) clearInterval(interval);
    }, 60);
  });
}

// INIT
renderMarket();
</script>

</body>
</html>
